<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Saniya ❤️</title>

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
}

button{
width:180px;
height:180px;
border:none;
border-radius:50%;
background:#ff2d55;
color:white;
font-size:30px;
font-weight:bold;
box-shadow:0 0 30px #ff2d55;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
</style>

</head>

<body>

<button>
❤️<br>Poke Me
</button>

</body>
</html>
