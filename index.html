<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Saniya ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(#ffd6e7, #fff);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  padding: 20px;
}

#poke {
  width: 160px;
  height: 160px;
  background: #ff5c8a;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#message {
  display: none;
}

h1 {
  color: #ff2f68;
  font-size: 35px;
}

p {
  font-size: 20px;
  color: #444;
}

img {
  width: 250px;
  border-radius: 20px;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

  <div id="poke">
    Poke 🎈
  </div>

  <div id="message">

    <h1>Happy Birthday Saniya ❤️</h1>

    <p>
      A small surprise for a beautiful soul ✨
    </p>

    <img src="photo.jpeg.JPG">

  </div>

</div>


<script>

document.getElementById("poke").onclick = function(){

  document.getElementById("poke").style.display = "none";

  document.getElementById("message").style.display = "block";

};

</script>


</body>
</html>
